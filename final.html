<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Monitor Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .live-indicator {
            width: 12px;
            height: 12px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }

        .video-section {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
        }

        .video-title {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .status-badge {
            background: #22c55e;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #0f172a;
            border-radius: 12px;
            overflow: hidden;
        }

        #video-stream {
            width: 100%;
            height: auto;
            display: block;
            min-height: 500px;
            object-fit: contain;
        }

        #video-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #64748b;
            font-size: 1.1rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #334155;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid #334155;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .stat-footer {
            color: #64748b;
            font-size: 0.85rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #0f172a;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* Couleurs spécifiques */
        .total-card { border-left: 4px solid #3b82f6; }
        .total-icon { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .total-value { color: #3b82f6; }

        .occupied-card { border-left: 4px solid #ef4444; }
        .occupied-icon { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .occupied-value { color: #ef4444; }
        .occupied-progress { background: #ef4444; }

        .progress-card { border-left: 4px solid #f59e0b; }
        .progress-icon { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .progress-value { color: #f59e0b; }

        .available-card { border-left: 4px solid #22c55e; }
        .available-icon { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .available-value { color: #22c55e; }
        .available-progress { background: #22c55e; }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .color-green { background: #22c55e; }
        .color-yellow { background: #eab308; }
        .color-red { background: #ef4444; }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <span class="live-indicator"></span>
                Parking Monitor Pro
            </h1>
            <p class="subtitle">Surveillance en temps réel</p>
        </header>

        <div class="main-grid">
            <!-- Section Vidéo -->
            <div class="video-section">
                <div class="video-header">
                    <h2 class="video-title">Flux Vidéo Annoté</h2>
                    <div class="status-badge">
                        <span class="live-indicator"></span>
                        EN DIRECT
                    </div>
                </div>
                <div class="video-wrapper">
                    <img id="video-stream" alt="Flux parking" />
                    <div id="video-placeholder">
                        <div class="loading-spinner"></div>
                        <span>Connexion au flux vidéo...</span>
                    </div>
                </div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color color-green"></div>
                        <span>Disponible</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color color-yellow"></div>
                        <span>En Progression</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color color-red"></div>
                        <span>Occupée</span>
                    </div>
                </div>
            </div>

            <!-- Section Statistiques -->
            <div class="stats-section">
                <!-- Total Places -->
                <div class="stat-card total-card">
                    <div class="stat-header">
                        <span class="stat-label">Total Places</span>
                        <div class="stat-icon total-icon">🅿️</div>
                    </div>
                    <div class="stat-value total-value" id="total-spots">0</div>
                    <div class="stat-footer">Capacité totale du parking</div>
                </div>

                <!-- Places Occupées -->
                <div class="stat-card occupied-card">
                    <div class="stat-header">
                        <span class="stat-label">Occupées</span>
                        <div class="stat-icon occupied-icon">🚗</div>
                    </div>
                    <div class="stat-value occupied-value" id="occupied-spots">0</div>
                    <div class="stat-footer">Taux: <span id="occupancy-rate">0%</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill occupied-progress" id="occupied-bar"></div>
                    </div>
                </div>

                <!-- En Progression -->
                <div class="stat-card progress-card">
                    <div class="stat-header">
                        <span class="stat-label">En Progression</span>
                        <div class="stat-icon progress-icon">⏳</div>
                    </div>
                    <div class="stat-value progress-value" id="progress-spots">0</div>
                    <div class="stat-footer">Véhicules en train de se garer</div>
                </div>

                <!-- Places Disponibles -->
                <div class="stat-card available-card">
                    <div class="stat-header">
                        <span class="stat-label">Disponibles</span>
                        <div class="stat-icon available-icon">✅</div>
                    </div>
                    <div class="stat-value available-value" id="available-spots">0</div>
                    <div class="stat-footer">Places libres et prêtes</div>
                    <div class="progress-bar">
                        <div class="progress-fill available-progress" id="available-bar"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_URL = 'http://localhost:5000';
        
        const videoElement = document.getElementById('video-stream');
        const placeholder = document.getElementById('video-placeholder');

        // Fonction pour mettre à jour les statistiques
        async function updateStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();
                
                // Mise à jour des valeurs
                document.getElementById('total-spots').textContent = data.total;
                document.getElementById('occupied-spots').textContent = data.occupied;
                document.getElementById('progress-spots').textContent = data.progress;
                document.getElementById('available-spots').textContent = data.available;
                
                // Calcul du taux d'occupation
                const occupancyRate = ((data.occupied / data.total) * 100).toFixed(1);
                document.getElementById('occupancy-rate').textContent = occupancyRate + '%';
                
                // Mise à jour des barres de progression
                document.getElementById('occupied-bar').style.width = occupancyRate + '%';
                const availableRate = ((data.available / data.total) * 100).toFixed(1);
                document.getElementById('available-bar').style.width = availableRate + '%';
                
            } catch (error) {
                console.error('Erreur lors de la récupération des stats:', error);
            }
        }

        // Fonction pour initialiser le flux vidéo
        function setupVideoStream() {
            const streamUrl = `${API_URL}/video_feed?t=${Date.now()}`;
            videoElement.src = streamUrl;
            
            videoElement.onload = () => {
                videoElement.style.display = 'block';
                placeholder.style.display = 'none';
            };
            
            videoElement.onerror = () => {
                console.error('Erreur de chargement du flux vidéo');
                placeholder.innerHTML = `
                    <div style="color: #ef4444; font-size: 1.5rem;">❌</div>
                    <span>Flux vidéo indisponible</span>
                    <span style="font-size: 0.9rem; color: #64748b;">Vérifiez que le serveur est démarré</span>
                `;
            };
        }

        // Vérification de connexion
        function checkConnection() {
            if (videoElement.complete && videoElement.naturalHeight === 0) {
                console.log('Tentative de reconnexion...');
                setupVideoStream();
            }
        }

        // Initialisation
        setupVideoStream();
        updateStats();
        
        // Mise à jour des stats toutes les secondes
        setInterval(updateStats, 1000);
        
        // Vérification périodique de la connexion
        setInterval(checkConnection, 5000);
    </script>
</body>
</html>
